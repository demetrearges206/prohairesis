<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="pod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14263f"></stop>
      <stop offset="1" stop-color="#0a1628"></stop>
    </linearGradient>
    <radialGradient id="podlight" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#7ec3ff" stop-opacity=".7"></stop>
      <stop offset="1" stop-color="#7ec3ff" stop-opacity="0"></stop>
    </radialGradient>
    <symbol id="col" viewBox="0 0 70 120" width="70" height="120">

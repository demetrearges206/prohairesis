<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  
  <defs>
    <linearGradient id="beamFade" x1="0" y1=".5" x2="1" y2=".5">
      <stop offset="0" stop-color="#0fffd0" stop-opacity="0"></stop>
      <stop offset=".25" stop-color="#0fffd0" stop-opacity=".18"></stop>
      <stop offset="1" stop-color="#aaffe8" stop-opacity=".55"></stop>
    </linearGradient>
    <radialGradient id="vpGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"></stop>
      <stop offset=".15" stop-color="#aaffe8" stop-opacity=".95"></stop>
      <stop offset=".6" stop-color="#0fffd0" stop-opacity=".35"></stop>
      <stop offset="1" stop-color="#0fffd0" stop-opacity="0"></stop>
    </radialGradient>
  </defs>
  
  <polygon points="700,450 1600,200 1600,700" fill="url(#beamFade)" opacity=".7"></polygon>
  
  <polygon points="700,450 1600,415 1600,485" fill="#aaffe8" opacity=".6"></polygon>
  
  <line x1="700" y1="450" x2="1600" y2="450" stroke="#ffffff" stroke-width="1.5" opacity=".95"></line>
  
  <circle cx="700" cy="450" r="60" fill="url(#vpGlow)"></circle>
</svg>
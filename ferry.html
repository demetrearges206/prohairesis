<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SEA–BI Ferry">
  <meta name="theme-color" content="#060f1f">
  <title>Seattle ↔ Bainbridge Ferry</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --navy:       #060f1f;
      --navy-mid:   #0b1a30;
      --navy-card:  #0e2040;
      --navy-light: #162d52;
      --teal:       #00c9a7;
      --teal-glow:  rgba(0,201,167,0.12);
      --teal-dim:   rgba(0,201,167,0.18);
      --blue:       #2196f3;
      --amber:      #ffc947;
      --red:        #ff5449;
      --white:      #eef3ff;
      --mid:        #8099c0;
      --dim:        #3a5070;
      --border:     rgba(255,255,255,0.07);
      --radius:     14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--navy);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overscroll-behavior-y: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .hdr {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--border);
      padding: max(14px, env(safe-area-inset-top)) 18px 12px;
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .hdr-left { display: flex; flex-direction: column; gap: 3px; }
    .route-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; line-height: 1; }
    .route-name .chevron { color: var(--teal); margin: 0 3px; }
    .live-row { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--mid); }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }
    .live-dot.live  { animation: livepulse 2s ease-in-out infinite; }
    .live-dot.stale { background: var(--red); animation: none; }
    .live-dot.off   { background: var(--dim); animation: none; }
    @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:.25} }
    .hdr-actions { display: flex; align-items: center; gap: 6px; }
    .icon-btn {
      background: none; border: 1px solid var(--border); color: var(--mid);
      width: 36px; height: 36px; border-radius: 10px; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { background: var(--teal-dim); color: var(--teal); }
    .icon-btn.spinning svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Direction Tabs ──────────────────────────────────────── */
    .tabs { display: flex; background: var(--navy-mid); border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 11px 6px; background: none;
      border: none; border-bottom: 2px solid transparent;
      color: var(--mid); font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
      cursor: pointer; transition: color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent; text-align: center; white-space: nowrap;
    }
    .tab.active { color: var(--teal); border-bottom-color: var(--teal); }

    /* ── Alert Banner ────────────────────────────────────────── */
    .alert-banner {
      margin: 12px 16px 0;
      border-radius: var(--radius);
      background: rgba(255,84,73,0.1);
      border: 1px solid rgba(255,84,73,0.3);
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--white);
    }
    .alert-banner.hidden { display: none; }
    .alert-banner.warn {
      background: rgba(255,201,71,0.1);
      border-color: rgba(255,201,71,0.3);
    }
    .alert-title {
      font-size: 10px; font-weight: 700; letter-spacing: 1.4px;
      text-transform: uppercase; color: var(--red); margin-bottom: 5px;
      display: flex; align-items: center; gap: 5px;
    }
    .alert-banner.warn .alert-title { color: var(--amber); }
    .alert-item { padding: 3px 0; color: var(--mid); font-size: 12px; }
    .alert-item + .alert-item { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 7px; }
    .alert-item strong { display: block; color: var(--white); margin-bottom: 2px; }

    /* ── Layout ──────────────────────────────────────────────── */
    .scroll-body { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .main {
      max-width: 520px; margin: 0 auto;
      padding: 0 0 max(40px, env(safe-area-inset-bottom));
    }

    /* ── Loading ─────────────────────────────────────────────── */
    .loading-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; padding: 64px 24px; color: var(--mid); font-size: 13px;
    }
    .ring {
      width: 36px; height: 36px; border: 3px solid var(--dim);
      border-top-color: var(--teal); border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    /* ── Error ───────────────────────────────────────────────── */
    .err-card {
      margin: 16px; padding: 16px 18px; border-radius: var(--radius);
      background: rgba(255,84,73,0.08); border: 1px solid rgba(255,84,73,0.25);
      color: var(--red); font-size: 13px; line-height: 1.5;
    }
    .err-card small { display: block; margin-top: 4px; color: var(--mid); font-size: 11px; }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 48px 24px 24px; color: var(--mid); }
    .empty-state strong { display: block; font-size: 17px; color: var(--white); margin-bottom: 5px; }

    /* ── Next Ferry Hero ─────────────────────────────────────── */
    .next-card {
      margin: 16px 16px 0; border-radius: var(--radius);
      background: var(--navy-card); border: 1px solid var(--border);
      padding: 18px 20px 16px; position: relative; overflow: hidden;
    }
    .next-card::before {
      content: ''; position: absolute; inset: 0 0 auto 0; height: 2px;
      background: linear-gradient(90deg, var(--teal) 0%, #2196f3 100%);
    }
    .next-eyebrow {
      font-size: 9px; font-weight: 700; letter-spacing: 1.8px;
      text-transform: uppercase; color: var(--teal); margin-bottom: 10px;
    }
    .next-body {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 8px; margin-bottom: 14px;
    }
    .next-depart { line-height: 1; }
    .depart-big { font-size: 52px; font-weight: 800; letter-spacing: -2.5px; line-height: 1; }
    .depart-ampm { font-size: 17px; font-weight: 600; color: var(--mid); margin-left: 2px; letter-spacing: 0; }
    .arrive-block { text-align: right; padding-bottom: 5px; }
    .arrive-label { font-size: 10px; color: var(--mid); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 2px; }
    .arrive-time { font-size: 24px; font-weight: 700; letter-spacing: -1px; color: var(--mid); }
    .next-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .vessel-tag { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--mid); min-width: 0; }
    .vessel-icon { font-size: 16px; flex-shrink: 0; }
    .vessel-tag-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .access-icon { font-size: 11px; color: var(--blue); flex-shrink: 0; }
    .countdown-pill {
      font-size: 14px; font-weight: 700; padding: 5px 14px; border-radius: 20px;
      background: var(--teal-dim); color: var(--teal); flex-shrink: 0;
      white-space: nowrap; transition: background 0.3s, color 0.3s;
    }
    .countdown-pill.soon { background: rgba(255,201,71,0.18); color: var(--amber); }
    .countdown-pill.now  { background: rgba(255,84,73,0.18);  color: var(--red); }
    .countdown-pill.gone { background: rgba(255,255,255,0.06); color: var(--mid); }

    /* ── Section label ───────────────────────────────────────── */
    .section-label {
      font-size: 9px; font-weight: 700; letter-spacing: 1.8px;
      text-transform: uppercase; color: var(--mid); padding: 18px 20px 8px;
    }

    /* ── Upcoming list ───────────────────────────────────────── */
    .upcoming-list { margin: 0 16px; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .sail-row {
      display: grid; grid-template-columns: 80px 1fr auto; align-items: center;
      gap: 8px; padding: 13px 16px; background: var(--navy-card);
      border-bottom: 1px solid var(--border);
    }
    .sail-row:last-child { border-bottom: none; }
    .sail-dep { font-size: 15px; font-weight: 700; white-space: nowrap; }
    .sail-dep small { font-size: 11px; font-weight: 500; color: var(--mid); margin-left: 1px; }
    .sail-mid { min-width: 0; }
    .sail-arr { font-size: 12px; color: var(--mid); }
    .sail-vessel { font-size: 11px; color: var(--dim); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sail-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; }
    .badge-dock     { background: rgba(255,201,71,0.15); color: var(--amber); }
    .badge-underway { background: var(--teal-glow); color: var(--teal); }

    /* ── Track vessel button + mini-map ─────────────────────── */
    .track-btn {
      width: 100%; margin-top: 12px; padding: 9px 14px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; color: var(--mid); font-size: 12px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 6px; transition: background 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .track-btn:active { background: rgba(255,255,255,0.08); }
    .track-btn.active { background: var(--teal-dim); color: var(--teal); border-color: rgba(0,201,167,0.3); }
    .mini-map-wrap {
      margin-top: 10px; border-radius: 10px; overflow: hidden;
      height: 0; transition: height 0.28s cubic-bezier(0.4,0,0.2,1);
      border: 0px solid var(--border);
    }
    .mini-map-wrap.open {
      height: 190px;
      border-width: 1px;
    }
    #miniMapEl { height: 190px; }

    /* ── Wait Times ──────────────────────────────────────────── */
    .wait-row {
      margin: 0 16px; border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
    }
    .wait-cell {
      padding: 12px 16px; background: var(--navy-card);
      border-bottom: 1px solid var(--border);
    }
    .wait-cell:last-child { border-bottom: none; }
    .wait-route { font-size: 12px; font-weight: 700; color: var(--teal); margin-bottom: 3px; }
    .wait-note  { font-size: 13px; color: var(--white); line-height: 1.4; }
    .wait-meta  { font-size: 10px; color: var(--mid); margin-top: 4px; }
    .wait-na    { font-size: 12px; color: var(--dim); }

    /* ── Map ─────────────────────────────────────────────────── */
    .map-section { margin: 0 16px; }
    .map-frame { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); height: 300px; position: relative; }
    #ferry-map { width: 100%; height: 100%; background: #060f1f; }
    .map-hint {
      position: absolute; bottom: 8px; right: 8px; z-index: 400;
      background: rgba(6,15,31,0.75); color: var(--mid); font-size: 10px;
      padding: 3px 7px; border-radius: 6px; pointer-events: none;
    }

    /* Leaflet overrides */
    .leaflet-container { background: #060f1f !important; }
    .leaflet-popup-content-wrapper {
      background: var(--navy-mid) !important; color: var(--white) !important;
      border: 1px solid var(--border) !important; box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
      border-radius: 10px !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-content { margin: 12px 14px !important; min-width: 160px; }
    .pop-name { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .pop-row { font-size: 11px; color: var(--mid); line-height: 1.8; }
    .pop-row b { color: var(--white); font-weight: 600; }
    .leaflet-control-attribution { background: rgba(255,255,255,0.75) !important; color: #555 !important; font-size: 9px !important; }
    .leaflet-control-attribution a { color: #333 !important; }
    .leaflet-control-zoom a { background: rgba(6,15,31,0.82) !important; color: var(--white) !important; border-color: var(--border) !important; }

    /* ── Vessel chips ────────────────────────────────────────── */
    .vessel-live-strip {
      display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
      padding: 0 16px; -webkit-overflow-scrolling: touch;
    }
    .vessel-live-strip::-webkit-scrollbar { display: none; }
    .vessel-chip {
      flex-shrink: 0; display: flex; align-items: center; gap: 6px;
      background: var(--navy-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 12px; font-size: 12px;
      white-space: nowrap; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .vessel-chip:active { background: var(--navy-light); }
    .chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .chip-dot.underway { background: var(--teal); }
    .chip-dot.docked   { background: var(--amber); }
    .chip-name { font-weight: 600; }
    .chip-sub  { color: var(--mid); font-size: 11px; }

    /* ── Full schedule ───────────────────────────────────────── */
    .sched-toggle {
      display: flex; align-items: center; justify-content: space-between;
      width: calc(100% - 32px); margin: 0 16px; padding: 14px 18px;
      background: var(--navy-card); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--white);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.12s; -webkit-tap-highlight-color: transparent;
    }
    .sched-toggle:active { background: var(--navy-light); }
    .sched-chevron { font-size: 12px; color: var(--mid); transition: transform 0.2s; }
    .sched-chevron.open { transform: rotate(180deg); }
    .sched-list {
      margin: 8px 16px 0; border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden; display: none;
    }
    .sched-list.open { display: block; }
    .sched-row {
      display: grid; grid-template-columns: 80px 1fr 100px; align-items: center;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: var(--navy-card); font-size: 13px; gap: 6px;
    }
    .sched-row:last-child { border-bottom: none; }
    .sched-row.past { opacity: 0.3; }
    .sched-row.next-sail { background: var(--navy-light); border-left: 2px solid var(--teal); }
    .sched-t { font-weight: 700; }
    .sched-t small { font-size: 10px; font-weight: 500; color: var(--mid); }
    .sched-arr-t { color: var(--mid); font-size: 12px; }
    .sched-v { color: var(--dim); font-size: 11px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sched-note {
      font-size: 10px; color: var(--mid); padding: 8px 16px;
      background: var(--navy-mid); border-bottom: 1px solid var(--border); font-style: italic;
    }

    /* ── Home tip ────────────────────────────────────────────── */
    .home-tip {
      margin: 16px; padding: 12px 14px; border-radius: 10px;
      background: rgba(33,150,243,0.08); border: 1px solid rgba(33,150,243,0.2);
      font-size: 12px; color: var(--mid);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .home-tip-text span { color: var(--white); font-weight: 600; }
    .home-tip-close { background: none; border: none; color: var(--mid); font-size: 16px; cursor: pointer; flex-shrink: 0; padding: 0 4px; }
    .home-tip.hidden { display: none; }

    @media (min-width: 520px) { .depart-big { font-size: 58px; } }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="route-name">Seattle <span class="chevron">↔</span> Bainbridge</div>
    <div class="live-row">
      <span class="live-dot off" id="liveDot"></span>
      <span id="liveText">Loading…</span>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="icon-btn" id="refreshBtn" title="Refresh" aria-label="Refresh">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.04-3.35L10 6h5V1l-1.35 1.35Z" fill="currentColor"/>
      </svg>
    </button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-dir="SEA-BI" id="tabSeaBi">Seattle → Bainbridge</button>
  <button class="tab" data-dir="BI-SEA" id="tabBiSea">Bainbridge → Seattle</button>
</div>

<div class="scroll-body">
  <main class="main">

    <div id="alertBanner" class="alert-banner hidden"></div>

    <div id="schedContent">
      <div class="loading-wrap"><div class="ring"></div><span>Fetching today's schedule…</span></div>
    </div>

    <div class="section-label">Terminal Wait Times</div>
    <div id="waitContent">
      <div style="padding:0 16px 8px"><div style="height:56px;border-radius:var(--radius);background:var(--navy-card);border:1px solid var(--border)"></div></div>
    </div>

    <div class="section-label">Live Vessels</div>
    <div id="vesselStrip" style="margin-bottom:10px"></div>

    <div class="map-section">
      <div class="map-frame">
        <div id="ferry-map"></div>
        <div class="map-hint">Tap vessel for details</div>
      </div>
    </div>

    <div id="homeTip" class="home-tip" style="margin-top:16px">
      <div class="home-tip-text">
        <span>Save to your home screen</span> — tap the share icon in Safari, then "Add to Home Screen."
      </div>
      <button class="home-tip-close" id="closeTip" aria-label="Dismiss">✕</button>
    </div>

  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

// ── Config ───────────────────────────────────────────────
const API_KEY   = '3cf97d36-63f9-42fe-9125-2675594d6c9e';
const SCHED_BASE = 'https://www.wsdot.wa.gov/ferries/api/schedule/rest';
const TERM_BASE  = 'https://www.wsdot.wa.gov/ferries/api/terminals/rest';
const VESS_BASE  = 'https://www.wsdot.wa.gov/ferries/api/vessels/rest';

// Terminal IDs confirmed from WSDOT VesselWatch URL params
const TERMINALS = {
  SEA: { id: 7, name: 'Seattle',           abbrev: 'SEA', lat: 47.60328, lng: -122.33787 },
  BI:  { id: 3, name: 'Bainbridge Island', abbrev: 'BI',  lat: 47.62375, lng: -122.51044 },
};

// Simplified Puget Sound coastline polygons (no tile dependency)
// Coordinates are [longitude, latitude] per GeoJSON spec
const PUGET_SOUND_LAND = { type: 'FeatureCollection', features: [
  { type: 'Feature', geometry: { type: 'Polygon', coordinates: [[
    // Bainbridge Island — clockwise from north tip
    [-122.525, 47.726], [-122.508, 47.715], [-122.480, 47.706], [-122.469, 47.681],
    [-122.469, 47.659], [-122.479, 47.641],
    // Eagle Harbor (cuts east into island; ferry dock is inside)
    [-122.499, 47.634], [-122.513, 47.629], [-122.526, 47.624],
    [-122.513, 47.617], [-122.499, 47.611],
    // south shore
    [-122.488, 47.595], [-122.487, 47.577], [-122.491, 47.566],
    [-122.502, 47.563], [-122.514, 47.565], [-122.530, 47.570],
    // west shore (Port Orchard Passage side) north to tip
    [-122.547, 47.581], [-122.556, 47.598], [-122.558, 47.621],
    [-122.556, 47.648], [-122.551, 47.671], [-122.547, 47.691],
    [-122.540, 47.707], [-122.525, 47.726],
  ]] } },
  { type: 'Feature', geometry: { type: 'Polygon', coordinates: [[
    // Seattle / King County mainland — west-facing shoreline, extends east off-screen
    [-122.412, 47.730], [-122.409, 47.700], [-122.404, 47.688], [-122.389, 47.672],
    [-122.378, 47.656], [-122.367, 47.641], [-122.358, 47.628], [-122.350, 47.616],
    [-122.344, 47.607], [-122.337, 47.597], [-122.335, 47.585],
    [-122.340, 47.572], [-122.355, 47.560], [-122.376, 47.553],
    [-122.416, 47.557], [-122.420, 47.540],
    [-122.200, 47.540], [-122.200, 47.730], [-122.412, 47.730],
  ]] } },
  { type: 'Feature', geometry: { type: 'Polygon', coordinates: [[
    // Kitsap Peninsula — east-facing shore visible at wider zoom, extends west off-screen
    [-122.600, 47.730], [-122.568, 47.718], [-122.556, 47.706], [-122.562, 47.688],
    [-122.574, 47.666], [-122.580, 47.645], [-122.582, 47.620],
    [-122.576, 47.598], [-122.570, 47.576], [-122.580, 47.554],
    [-122.750, 47.540], [-122.750, 47.730], [-122.600, 47.730],
  ]] } },
] };

// ── State ────────────────────────────────────────────────
let schedData    = null;
let vesselList   = [];
let routeId      = 9;       // overridden dynamically via schedroutes
let disruptions  = [];
let waitData     = [];
let direction    = 'SEA-BI';
let schedOpen    = false;
let cdTimer      = null;
let leafMap      = null;
let vMarkers     = {};
let lastUpdate   = null;
let isLoading    = false;

// ── Utilities ────────────────────────────────────────────
function parseWSDot(s) {
  if (!s) return null;
  const m = String(s).match(/\/Date\((-?\d+)(?:[+-]\d{4})?\)\//);
  return m ? new Date(+m[1]) : null;
}
function fmtTime(d) {
  if (!d) return '—';
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}
function splitTime(d) {
  if (!d) return { t: '—', ap: '' };
  const s = fmtTime(d).split(' ');
  return { t: s[0], ap: s[1] || '' };
}
function minsTo(d)   { return Math.round((d - Date.now()) / 60000); }
function elapsed(d)  {
  const m = Math.round((Date.now() - d) / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  return `${Math.floor(m/60)}h ago`;
}
function countdownInfo(d) {
  const m = minsTo(d);
  if (m < -5)  return { text: 'Departed', cls: 'gone' };
  if (m < 0)   return { text: 'Leaving',  cls: 'now'  };
  if (m < 10)  return { text: `${m}m`,    cls: 'now'  };
  if (m < 30)  return { text: `${m}m`,    cls: 'soon' };
  const h = Math.floor(m / 60), rm = m % 60;
  return { text: h ? `${h}h ${rm}m` : `${m}m`, cls: '' };
}
function todayDateStr() {
  const d = new Date();
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
}

// ── API fetch with JSONP fallback ─────────────────────────
function jsonpFetch(url) {
  return new Promise((res, rej) => {
    const id = `_wsf_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const s = document.createElement('script');
    let tid;
    const cleanup = () => { delete window[id]; s.remove(); clearTimeout(tid); };
    tid = setTimeout(() => { rej(new Error('JSONP timeout')); cleanup(); }, 12000);
    window[id] = data => { res(data); cleanup(); };
    s.onerror = () => { rej(new Error('JSONP failed')); cleanup(); };
    s.src = `${url}&callback=${id}`;
    document.head.appendChild(s);
  });
}
async function apiFetch(url) {
  try {
    const r = await fetch(url, { headers: { Accept: 'application/json' } });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  } catch {
    return jsonpFetch(url);
  }
}
function apiUrl(base, path) {
  return `${base}/${path}?apiaccesscode=${API_KEY}`;
}

// ── API calls ─────────────────────────────────────────────

// schedroutes: all scheduled routes + service disruptions
// Used to: (1) dynamically resolve the SEA-BI RouteID, (2) surface any active alerts
async function loadSchedRoutes() {
  return apiFetch(apiUrl(SCHED_BASE, 'schedroutes'));
}

// Primary: scheduletoday/{routeId} — no date required, reliably returns today's combos.
// Fallback: terminal-pair date-based endpoints (date uses real / slashes as path segments).
async function loadSchedule() {
  try {
    const data = await apiFetch(apiUrl(SCHED_BASE, `scheduletoday/${routeId}/false`));
    if (data) {
      const combos = Array.isArray(data)
        ? data.flatMap(x => x.TerminalCombos || [])
        : (data.TerminalCombos || []);
      if (combos.length) return { TerminalCombos: combos };
    }
  } catch (e) { console.warn('scheduletoday failed, trying terminal-pair:', e); }

  // Fallback: fetch both directions by terminal ID + date
  const td = todayDateStr();
  const [r1, r2] = await Promise.allSettled([
    apiFetch(apiUrl(SCHED_BASE, `schedule/${td}/${TERMINALS.SEA.id}/${TERMINALS.BI.id}`)),
    apiFetch(apiUrl(SCHED_BASE, `schedule/${td}/${TERMINALS.BI.id}/${TERMINALS.SEA.id}`)),
  ]);
  const combos = [];
  for (const r of [r1, r2]) {
    if (r.status !== 'fulfilled' || !r.value) continue;
    const v = r.value;
    const tc = Array.isArray(v)
      ? v.flatMap(x => x.TerminalCombos || [])
      : (v.TerminalCombos || []);
    combos.push(...tc);
  }
  return { TerminalCombos: combos };
}

// Live vessel positions for all WSF vessels
async function loadVessels() {
  return apiFetch(apiUrl(VESS_BASE, 'vessellocations'));
}

// Terminal wait times: car queue depth at each terminal dock
async function loadWaitTimes() {
  return apiFetch(apiUrl(TERM_BASE, 'terminalwaittimes'));
}

// ── Process schedroutes response ──────────────────────────
function processSchedRoutes(data) {
  if (!data || !Array.isArray(data)) return;

  // Find the SEA-BI route and extract its RouteID
  const seaBiRoute = data.find(r => {
    const abbr = (r.RouteAbbrev || '').toLowerCase();
    const desc = (r.Description || '').toLowerCase();
    return abbr === 'sea-bi' || (desc.includes('seattle') && desc.includes('bainbridge'));
  });
  if (seaBiRoute && seaBiRoute.RouteID) {
    routeId = seaBiRoute.RouteID;
  }

  // Collect service disruptions for this route
  disruptions = [];
  const routesToCheck = seaBiRoute ? [seaBiRoute] : data;
  routesToCheck.forEach(r => {
    if (!r.ServiceDisruptions) return;
    r.ServiceDisruptions.forEach(d => {
      if (d.DisruptionDescription || d.BulletinFlag) {
        disruptions.push({
          title: d.DisruptionDescription || 'Service Disruption',
          bulletin: d.BulletinFlag,
        });
      }
    });
  });
}

// ── Alert banner ─────────────────────────────────────────
function renderAlerts() {
  const banner = document.getElementById('alertBanner');
  if (!disruptions.length) {
    banner.classList.add('hidden');
    return;
  }
  const isBulletin = disruptions.some(d => d.bulletin);
  banner.className = `alert-banner${isBulletin ? '' : ' warn'}`;
  banner.innerHTML =
    `<div class="alert-title">${isBulletin ? '⚠ Service Alert' : '⚠ Advisory'}</div>` +
    disruptions.map(d => `<div class="alert-item"><strong>${d.title}</strong></div>`).join('');
}

// ── Wait times ────────────────────────────────────────────
function renderWaitTimes() {
  const wrap = document.getElementById('waitContent');
  const deptTermId = direction === 'SEA-BI' ? TERMINALS.SEA.id : TERMINALS.BI.id;
  const deptName   = direction === 'SEA-BI' ? 'Seattle (Colman Dock)' : 'Bainbridge Island';

  const terminal = waitData.find(t => t.TerminalID === deptTermId);
  const allWaits = terminal?.WaitTimes || [];

  // Only show the Bainbridge ↔ Seattle route, not Bremerton or others
  const biWaits = allWaits.filter(wt =>
    (wt.RouteName || '').toLowerCase().includes('bainbridge')
  );
  const waits = biWaits.length ? biWaits : allWaits.slice(0, 1); // graceful fallback

  if (!waits.length) {
    wrap.innerHTML = `
      <div class="wait-row">
        <div class="wait-cell">
          <div class="wait-route">Seattle / Bainbridge Island</div>
          <span class="wait-na">No wait data available</span>
        </div>
      </div>`;
    return;
  }

  const rows = waits.map(wt => {
    const note    = (wt.WaitTimeNotes || '').trim();
    const updated = wt.WaitTimeLastUpdated ? parseWSDot(wt.WaitTimeLastUpdated) : null;
    const displayNote = note || 'No current wait information';
    return `
      <div class="wait-cell">
        <div class="wait-route">${wt.RouteName || deptName}</div>
        <div class="wait-note">${displayNote}</div>
        <div class="wait-meta">As of ${updated ? fmtTime(updated) : 'recent update'} · ${deptName}</div>
      </div>`;
  }).join('');

  wrap.innerHTML = `<div class="wait-row">${rows}</div>`;
}

// ── Schedule parsing ──────────────────────────────────────
function getAllCombos() {
  if (!schedData) return [];
  if (Array.isArray(schedData)) return schedData.flatMap(s => s.TerminalCombos || []);
  return schedData.TerminalCombos || [];
}

function findCombo() {
  const combos = getAllCombos();
  const isSeaBi = direction === 'SEA-BI';
  // Try exact ID match first
  let c = combos.find(c =>
    isSeaBi
      ? (c.DepartingTerminalID === TERMINALS.SEA.id && c.ArrivingTerminalID === TERMINALS.BI.id)
      : (c.DepartingTerminalID === TERMINALS.BI.id  && c.ArrivingTerminalID === TERMINALS.SEA.id)
  );
  // Fall back to name matching
  if (!c) {
    c = combos.find(c => {
      const dep = (c.DepartingTerminalName || '').toLowerCase();
      const arr = (c.ArrivingTerminalName  || '').toLowerCase();
      return isSeaBi
        ? (dep.includes('seattle') && arr.includes('bainbridge'))
        : (dep.includes('bainbridge') && arr.includes('seattle'));
    });
  }
  return c || null;
}

const CROSSING_MS = 35 * 60 * 1000; // ~35 min crossing time

function getDepartures() {
  const combo = findCombo();
  if (!combo || !combo.Times) return [];
  return combo.Times
    .map(t => {
      const depart = parseWSDot(t.DepartingTime);
      // ArrivingTime is sometimes null; fall back to depart + 35 min
      const arrive = parseWSDot(t.ArrivingTime) || (depart ? new Date(depart.getTime() + CROSSING_MS) : null);
      return {
        depart, arrive,
        vessel:     t.VesselName || '',
        accessible: t.VesselHandicapAccessible,
      };
    })
    .filter(t => t.depart)
    .sort((a, b) => a.depart - b.depart);
}

function getScheduleNotes() {
  const combo = findCombo();
  return combo && combo.SailingNotes ? [combo.SailingNotes] : [];
}

// ── Per-vessel color ─────────────────────────────────────
// 8 perceptually distinct hues, roughly 45° apart, calibrated for dark backgrounds
const VESSEL_PALETTE = ['#00c9a7','#ffc947','#f472b6','#60a5fa','#fb923c','#a3e635','#c084fc','#f87171'];
function getVesselColor(name) {
  if (!name) return VESSEL_PALETTE[0];
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  return VESSEL_PALETTE[h % VESSEL_PALETTE.length];
}

// ── Mini-map inside Next Sailing card ────────────────────
let miniMap = null;

function closeMiniMap() {
  const wrap = document.getElementById('miniMapWrap');
  const btn  = document.getElementById('trackBtn');
  if (wrap) wrap.classList.remove('open');
  if (btn)  btn.classList.remove('active');

}

function openMiniMap(vesselName) {
  const wrap = document.getElementById('miniMapWrap');
  const btn  = document.getElementById('trackBtn');
  const el   = document.getElementById('miniMapEl');

    zoomControl: false, attributionControl: false,

  L.polyline([
    [TERMINALS.SEA.lat, TERMINALS.SEA.lng],

  const mkLabel = (t) => L.marker([t.lat, t.lng], {

  }).addTo(miniMap);

        <svg width="18" height="24" viewBox="0 0 18 24" fill="none"
             style="transform:rotate(${vessel.Heading||0}deg);filter:drop-shadow(0 0 6px ${color}88)">
          <path d="M9 2 L16 21 Q9 18 2 21 Z" fill="${color}"/>
        </svg></div>`,
      className: '', iconSize: [30, 30], iconAnchor: [15, 15],
    });
    L.marker([vessel.Latitude, vessel.Longitude], { icon })
      .bindPopup(`<div style="font-weight:700;font-size:13px">⛴ ${vesselName}</div><div style="font-size:11px;color:#8099c0;margin-top:4px">${Math.round(vessel.Speed||0)} kts · ${Math.round(vessel.Heading||0)}°</div>`, { closeButton: false })
      .addTo(miniMap);
    miniMap.setView([vessel.Latitude, vessel.Longitude], 11);
  } else {
    miniMap.fitBounds([[TERMINALS.SEA.lat, TERMINALS.SEA.lng],[TERMINALS.BI.lat, TERMINALS.BI.lng]], { padding: [20,20] });
  }

// ── Live vessel helpers ───────────────────────────────────
function getLiveVessel(name) {
  if (!name) return null;
  return vesselList.find(v => v.VesselName === name && v.InService) || null;
}

function routeVessels() {
  return vesselList.filter(v =>
    v.InService &&
    ((v.DepartingTerminalID === TERMINALS.SEA.id || v.ArrivingTerminalID === TERMINALS.SEA.id) &&
     (v.DepartingTerminalID === TERMINALS.BI.id  || v.ArrivingTerminalID === TERMINALS.BI.id))
  );
}

// ── Render schedule ───────────────────────────────────────
function renderSchedule() {
  const wrap = document.getElementById('schedContent');
  const departures = getDepartures();

  if (!departures.length) {
    wrap.innerHTML = `<div class="empty-state"><strong>No sailings found</strong>Check back tomorrow</div>`;
    return;
  }

  const upcoming = departures.filter(d => minsTo(d.depart) > -5);
  if (!upcoming.length) {
    wrap.innerHTML = `<div class="empty-state"><strong>No more sailings today</strong>Last ferry has departed</div>`;
    renderFullSched(wrap, departures, null);
    return;
  }

  const next = upcoming[0];
  const rest = upcoming.slice(1, 4);
  const { t: dt, ap: dap } = splitTime(next.depart);
  const cd = countdownInfo(next.depart);
  const lv = getLiveVessel(next.vessel);
  const statusBadge = lv
    ? (lv.AtDock
        ? `<span class="sail-badge badge-dock">At Dock</span>`
        : `<span class="sail-badge badge-underway">Underway</span>`)
    : '';

  let html = `
    <div class="next-card">
      <div class="next-eyebrow">Next Sailing</div>
      <div class="next-body">
        <div class="next-depart">
          <span class="depart-big">${dt}</span><span class="depart-ampm">${dap}</span>
        </div>
        <div class="arrive-block">
          <div class="arrive-label">ARRIVES</div>
          <div class="arrive-time">${fmtTime(next.arrive)}</div>
        </div>
      </div>
      <div class="next-footer">
        <div class="vessel-tag">
          <span class="vessel-icon">⛴</span>
          <span class="vessel-tag-name" style="color:${getVesselColor(next.vessel)}">${next.vessel || 'Vessel TBD'}</span>
          ${next.accessible ? '<span class="access-icon" title="Accessible">♿</span>' : ''}
          ${statusBadge}
        </div>
        <div class="countdown-pill ${cd.cls}" id="cdPill">${cd.text}</div>
      </div>
      ${lv && !lv.AtDock ? `
      <button class="track-btn" id="trackBtn">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="flex-shrink:0">
          <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="6" cy="6" r="2" fill="currentColor"/>
        </svg>
        Track ${next.vessel}
      </button>
      <div class="mini-map-wrap" id="miniMapWrap"><div id="miniMapEl"></div></div>` : ''}
    </div>`;

  if (rest.length) {
    html += `<div class="section-label">Upcoming</div><div class="upcoming-list">`;
    rest.forEach(d => {
      const { t, ap } = splitTime(d.depart);
      const lv2 = getLiveVessel(d.vessel);
      const badge = lv2
        ? (lv2.AtDock
            ? `<span class="sail-badge badge-dock">Dock</span>`
            : `<span class="sail-badge badge-underway">Away</span>`)
        : '';
      html += `
        <div class="sail-row">
          <div class="sail-dep">${t}<small> ${ap}</small></div>
          <div class="sail-mid">
            <div class="sail-arr">→ ${fmtTime(d.arrive)}</div>
            <div class="sail-vessel">${d.vessel}</div>
          </div>
          <div style="text-align:right">${badge}</div>
        </div>`;
    });
    html += `</div>`;
  }

  // Full schedule toggle
  const notes = getScheduleNotes();
  const total = departures.length;
  const remaining = upcoming.length;
  html += `
    <div class="section-label" style="margin-top:6px">Full Schedule</div>
    <button class="sched-toggle" id="schedToggle">
      <span>Today · ${total} sailings${remaining < total ? ` · ${remaining} remaining` : ''}</span>
      <span class="sched-chevron ${schedOpen ? 'open' : ''}" id="schedChevron">▼</span>
    </button>
    <div class="sched-list ${schedOpen ? 'open' : ''}" id="schedList">`;

  notes.forEach(n => { html += `<div class="sched-note">${n}</div>`; });
  departures.forEach(d => {
    const isPast = minsTo(d.depart) <= -5;
    const isNext = d === next;
    const { t, ap } = splitTime(d.depart);
    html += `
      <div class="sched-row ${isPast ? 'past' : ''} ${isNext ? 'next-sail' : ''}">
        <div class="sched-t">${t}<small> ${ap}</small></div>
        <div class="sched-arr-t">→ ${fmtTime(d.arrive)}</div>
        <div class="sched-v">${d.vessel}</div>
      </div>`;
  });
  html += `</div>`;

  wrap.innerHTML = html;

  document.getElementById('schedToggle').addEventListener('click', () => {
    schedOpen = !schedOpen;
    document.getElementById('schedList').classList.toggle('open', schedOpen);
    document.getElementById('schedChevron').classList.toggle('open', schedOpen);
  });

  // Track button: toggle mini-map in the next-sailing card
  document.getElementById('trackBtn')?.addEventListener('click', () => {
    const wrap = document.getElementById('miniMapWrap');
    if (wrap?.classList.contains('open')) {
      closeMiniMap();
    } else {
      openMiniMap(next.vessel);
    }
  });

  if (cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    const pill = document.getElementById('cdPill');
    if (!pill) { clearInterval(cdTimer); return; }
    const { text, cls } = countdownInfo(next.depart);
    pill.textContent = text;
    pill.className = `countdown-pill ${cls}`;
  }, 20000);
}

// ── Vessel strip ──────────────────────────────────────────
function renderVesselStrip() {
  const strip = document.getElementById('vesselStrip');
  const rv = routeVessels();
  if (!rv.length) { strip.innerHTML = ''; return; }

  strip.innerHTML = '<div class="vessel-live-strip">' +
    rv.map(v => {
      const eta = parseWSDot(v.Eta);
      const sub = v.AtDock
        ? `Docked · ${v.DepartingTerminalAbbrev || ''}`
        : (eta ? `ETA ${fmtTime(eta)}` : `${Math.round(v.Speed || 0)} kts`);
      const vcolor = v.AtDock ? '#ffc947' : getVesselColor(v.VesselName);
      return `<div class="vessel-chip" data-vid="${v.VesselID}" style="border-color:${vcolor}22">
        <span class="chip-dot" style="background:${vcolor}"></span>
        <span class="chip-name" style="color:${vcolor}">${v.VesselName}</span>

  strip.querySelectorAll('.vessel-chip').forEach(chip => {
    chip.addEventListener('click', () => {

function popupHtml(v) {
  const eta  = parseWSDot(v.Eta);
  const left = parseWSDot(v.LeftDock);
  const rows = [];
  if (v.AtDock) {
    rows.push(`Status: <b>At dock — ${v.DepartingTerminalName || ''}</b>`);
  } else {
    rows.push(`Status: <b>Underway</b>`);
    if (v.DepartingTerminalName) rows.push(`From: <b>${v.DepartingTerminalName}</b>`);
    if (v.ArrivingTerminalName)  rows.push(`To: <b>${v.ArrivingTerminalName}</b>`);
    if (eta)  rows.push(`ETA: <b>${fmtTime(eta)}</b>`);
    if (left) rows.push(`Left dock: <b>${fmtTime(left)}</b>`);
    rows.push(`Speed: <b>${Math.round(v.Speed||0)} kts · ${Math.round(v.Heading||0)}°</b>`);
  }
  return `<div class="pop-name">⛴ ${v.VesselName}</div><div class="pop-row">${rows.join('<br>')}</div>`;
}

function updateMap() {
  if (!leafMap) return;
  const rv = routeVessels();
  const activeIds = new Set(rv.map(v => v.VesselID));
  Object.keys(vMarkers).forEach(id => {
    if (!activeIds.has(+id)) { leafMap.removeLayer(vMarkers[id]); delete vMarkers[id]; }
  });
  rv.forEach(v => {
    if (!v.Latitude || !v.Longitude) return;
    const icon   = vesselMarkerIcon(v.Heading, v.AtDock, v.VesselName);
    const popup  = popupHtml(v);
    if (vMarkers[v.VesselID]) {
      vMarkers[v.VesselID].setLatLng([v.Latitude, v.Longitude]).setIcon(icon);
      vMarkers[v.VesselID].getPopup()?.setContent(popup);
    } else {
      vMarkers[v.VesselID] = L.marker([v.Latitude, v.Longitude], { icon })
        .bindPopup(popup, { maxWidth: 230, closeButton: false })
        .addTo(leafMap);
    }
  });
}

// ── Status bar ────────────────────────────────────────────
function setStatus(state) {
  const dot  = document.getElementById('liveDot');
  const text = document.getElementById('liveText');
  if (state === 'loading') { dot.className = 'live-dot off'; text.textContent = 'Refreshing…'; }
  else if (state === 'live')  { dot.className = 'live-dot live';  text.textContent = lastUpdate ? `Updated ${elapsed(lastUpdate)}` : 'Live'; }
  else if (state === 'stale') { dot.className = 'live-dot stale'; text.textContent = lastUpdate ? `Stale · ${elapsed(lastUpdate)}` : 'Offline'; }
}

function showError(msg) {
  if (!schedData) {
    document.getElementById('schedContent').innerHTML =
      `<div class="err-card">⚠ ${msg}<small>Tap ↺ to retry</small></div>`;
  }
  setStatus('stale');
}

// ── Refresh ───────────────────────────────────────────────
async function refresh(forceSchedReload) {
  if (isLoading) return;
  isLoading = true;
  setStatus('loading');
  document.getElementById('refreshBtn').classList.add('spinning');

  try {
    const needSched = forceSchedReload || !schedData;

    // All four calls run in parallel. loadSchedule uses scheduletoday/9 as primary
    // (routeId defaults to 9 = SEA-BI so no dependency on schedroutes completing first).
    const fetches = [loadVessels(), loadWaitTimes()];
    if (needSched) fetches.push(loadSchedRoutes(), loadSchedule());

    // Hard cap: if ANY fetch hangs past 15s the whole refresh fails visibly
    const masterTimeout = new Promise((_, rej) =>
      setTimeout(() => rej(new Error('Ferry data timed out — tap ↺ to retry')), 15000)
    );
    const results = await Promise.race([Promise.allSettled(fetches), masterTimeout]);

    if (results[0].status === 'fulfilled' && Array.isArray(results[0].value)) {
      vesselList = results[0].value;
    }
    if (results[1].status === 'fulfilled' && Array.isArray(results[1].value)) {
      waitData = results[1].value;
    }
    if (needSched) {
      if (results[2]?.status === 'fulfilled') processSchedRoutes(results[2].value);
      if (results[3]?.status === 'fulfilled') schedData = results[3].value;
    }

    if (!schedData) throw new Error('No schedule data');

    lastUpdate = new Date();
    renderAlerts();
    renderSchedule();
    renderWaitTimes();
    renderVesselStrip();
    updateMap();
    setStatus('live');

  } catch (e) {
    console.error('Refresh error:', e);
    showError('Could not load ferry data. Check your connection.');
  } finally {
    isLoading = false;
    document.getElementById('refreshBtn').classList.remove('spinning');
  }
}

// Refresh stale label without fetching
setInterval(() => { if (lastUpdate) setStatus('live'); }, 60000);

// Auto-refresh: vessels + wait times every 60s; full schedule every 10min
setInterval(() => refresh(false),       60 * 1000);
setInterval(() => refresh(true),   10 * 60 * 1000);

// ── Boot ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  refresh(true);

  document.getElementById('refreshBtn').addEventListener('click', () => refresh(true));

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      if (tab.dataset.dir === direction) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      direction = tab.dataset.dir;
      schedOpen = false;
      renderWaitTimes();
      if (schedData) renderSchedule();
    });
  });

  const tipKey = 'ferry_tip_v1';
  if (localStorage.getItem(tipKey) || window.navigator.standalone) {
    document.getElementById('homeTip').classList.add('hidden');
  }
  document.getElementById('closeTip').addEventListener('click', () => {
    document.getElementById('homeTip').classList.add('hidden');
    localStorage.setItem(tipKey, '1');
  });

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) refresh(false);
  });
});
</script>
